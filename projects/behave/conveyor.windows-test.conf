# Windows TEST build — unsigned, local key, for deploying to the test box
# via scripts/test-windows.sh. Mirrors conveyor.windows.conf minus the
# org signing key/certificate. Not for release builds.
include required("conveyor.base.conf")

app {
  machines += windows.amd64

  # JCEF expects install.lock to exist which isn't in the tarball, otherwise it tries to delete bits of the app!
  windows {
    amd64.inputs += ${jcef.windows.amd64} -> jcef

    icons = "resources/public/images/logo.svg"

    inputs += {
      content = "."
      to = jcef/install.lock
    }

    package-extras += "zip-extras/Behave7_License.pdf"
    package-extras += "zip-extras/Behave7_FAQs.pdf"
    package-extras += "zip-extras/Behave7.exe"

    sign = false
    override-icon = false
  }
}

conveyor.compatibility-level = 21
