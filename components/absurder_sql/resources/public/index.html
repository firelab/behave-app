<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AbsurderSQL Test</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: monospace; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
      h1 { margin-bottom: 1rem; }
      #status { padding: 0.5rem; margin-bottom: 1rem; background: #eee; }
      #sql-input { width: 100%; height: 6rem; font-family: monospace; font-size: 0.9rem; padding: 0.5rem; margin-bottom: 0.5rem; }
      button { padding: 0.4rem 1rem; margin-right: 0.5rem; margin-bottom: 1rem; cursor: pointer; }
      #results { width: 100%; border-collapse: collapse; margin-top: 1rem; }
      #results th, #results td { border: 1px solid #ccc; padding: 0.3rem 0.5rem; text-align: left; }
      #results th { background: #f5f5f5; }
      #log { margin-top: 1rem; padding: 0.5rem; background: #1e1e1e; color: #0f0; font-size: 0.8rem; height: 12rem; overflow-y: auto; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <h1>AbsurderSQL Test</h1>
    <div id="status">Status: loading...</div>

    <label for="sql-input">SQL:</label>
    <textarea id="sql-input">CREATE TABLE IF NOT EXISTS test (id INTEGER PRIMARY KEY, name TEXT, value REAL);
INSERT INTO test (name, value) VALUES ('alpha', 1.1), ('beta', 2.2), ('gamma', 3.3);
SELECT * FROM test;</textarea>

    <div>
      <button id="btn-exec">Execute</button>
      <button id="btn-clear">Clear Log</button>
      <button id="btn-export">Export DB</button>
      <label for="btn-import" style="padding:0.4rem 1rem;margin-right:0.5rem;margin-bottom:1rem;cursor:pointer;border:1px solid ButtonBorder;background:ButtonFace;display:inline-block">
        Import DB
        <input id="btn-import" type="file" accept=".db,.sqlite,.sqlite3" style="display:none" />
      </label>
    </div>

    <table id="results"></table>
    <div id="log"></div>

    <!-- shadow-cljs compiled output -->
    <script src="/js/main.js"></script>
  </body>
</html>
